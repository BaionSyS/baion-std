# BAION STD cross-lineage verification — CI Gate.
# Builds all seven lineages from a fresh checkout, runs each lineage's own
# test suite, then runs verify_all_lineages.sh against the seven compiled
# CLIs together. The verify job is the claim: byte-identical canonical JSON
# + SHA-256 across C, C++, Rust, Go, D, Haskell, OCaml.
name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: every job only reads the repo. Nothing here writes
# contents, issues, or packages (GitHub hardening guidance).
permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.lineage }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lineage: [c, cpp, rust, go, d, haskell, ocaml]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        if: matrix.lineage == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.mod

      # Toolchains pinned to exact versions (not floating "latest"/"stable")
      # so a moved toolchain cannot silently change what a release build
      # means. Versions match the locally verified v0.2.1 build environment.
      - name: Set up Rust
        if: matrix.lineage == 'rust'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-07-15)
        with:
          toolchain: '1.94.0'

      - name: Set up D
        if: matrix.lineage == 'd'
        uses: dlang-community/setup-dlang@d7d85fcde7c4cd5f9a6618fce1bccc316e1e910b # v2
        with:
          compiler: dmd-2.112.0

      - name: Set up Haskell
        if: matrix.lineage == 'haskell'
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.16.1.0'

      - name: Set up OCaml
        if: matrix.lineage == 'ocaml'
        uses: ocaml/setup-ocaml@15d660006c1d3110d77c34b7faa3bddefe8b82f0 # v3.7.0
        with:
          ocaml-compiler: '5.2'

      - name: Build and test C
        if: matrix.lineage == 'c'
        run: make -C c build && make -C c test

      - name: Build and test C++
        if: matrix.lineage == 'cpp'
        run: |
          cmake -S cpp -B cpp/build
          cmake --build cpp/build
          ctest --test-dir cpp/build --output-on-failure

      - name: Build and test Rust
        if: matrix.lineage == 'rust'
        working-directory: rust
        run: |
          cargo build --release
          cargo test --release
          mkdir -p bin
          cp target/release/baion_canon_hash bin/baion_canon_hash

      - name: Build and test Go
        if: matrix.lineage == 'go'
        working-directory: go
        run: |
          go build -o bin/baion_canon_hash ./cmd/baion_canon_hash
          go test ./...

      - name: Build and test D
        if: matrix.lineage == 'd'
        working-directory: d
        run: |
          dub build --config=cli
          dub build --config=unittest && ./bin/baionstd-canon-test

      - name: Build and test Haskell
        if: matrix.lineage == 'haskell'
        working-directory: haskell
        run: |
          cabal update
          cabal build all
          cabal test all --test-show-details=direct
          mkdir -p bin
          cp "$(cabal list-bin baion-canon-hash)" bin/baion_canon_hash

      - name: Build and test OCaml
        if: matrix.lineage == 'ocaml'
        working-directory: ocaml
        run: |
          opam install --yes dune.3.21.1 yojson.3.0.0 digestif.1.3.0 alcotest.1.9.1
          make build test

      # Sanity: the CLI the verify job will receive must exist and answer.
      - name: Smoke the CLI
        run: |
          test -x "${{ matrix.lineage }}/bin/baion_canon_hash"
          printf '%s' '{"b":1,"a":[1,2]}' | "${{ matrix.lineage }}/bin/baion_canon_hash"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.lineage }}
          path: ${{ matrix.lineage }}/bin/baion_canon_hash
          if-no-files-found: error

  # Sanitizer gate for the two memory-unsafe lineages: same corpus contract
  # as the verifier, but the CLI is built with ASan+UBSan and aborts on any
  # undefined behavior. Added in v0.2.1 after UBSan caught an out-of-range
  # double→long long conversion on an admitted input (1e20) that the plain
  # build masked by saturating.
  sanitize:
    name: sanitize (${{ matrix.lineage }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lineage: [c, cpp]
    env:
      SAN_FLAGS: -fsanitize=address,undefined,float-cast-overflow -fno-sanitize-recover=all -fno-omit-frame-pointer
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test with ASan+UBSan
        run: |
          cmake -S ${{ matrix.lineage }} -B ${{ matrix.lineage }}/build-san \
            -DCMAKE_C_FLAGS="$SAN_FLAGS" \
            -DCMAKE_CXX_FLAGS="$SAN_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$SAN_FLAGS"
          cmake --build ${{ matrix.lineage }}/build-san
          ctest --test-dir ${{ matrix.lineage }}/build-san --output-on-failure

      - name: Run full corpus through sanitized CLI
        run: python3 conformance/run_corpus_cli.py ${{ matrix.lineage }}/bin/baion_canon_hash

  verify:
    name: verify 7/7 byte-identity
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cli-*

      # download-artifact strips the execute bit and lands each artifact in
      # cli-<lineage>/; restore the layout verify_all_lineages.sh expects.
      - name: Place CLIs
        run: |
          for L in c cpp rust go d haskell ocaml; do
            mkdir -p "$L/bin"
            mv "cli-$L/baion_canon_hash" "$L/bin/baion_canon_hash"
            chmod +x "$L/bin/baion_canon_hash"
          done

      - name: Run cross-lineage verifier
        run: ./verify_all_lineages.sh

      # Agreement-only sweep over generated danger-zone cases: any
      # accept/reject split or hash split across the seven CLIs fails.
      - name: Run differential probe
        run: python3 conformance/differential_probe.py
